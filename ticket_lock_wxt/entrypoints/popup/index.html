<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink-rgb: 255,255,255;
      --bg: #190637;
      --text: #fff;
      --accent: #3867E9;
      --accent-rgb: 56,103,233;
      --cyan: #01BFFA;
      --dim: rgba(255,255,255,0.55);
      --faint: rgba(255,255,255,0.32);
    }
    html[data-theme="light"] {
      --ink-rgb: 59,59,59;
      --bg: #F3F3F3;
      --text: #3B3B3B;
      /* Misma alfa que en oscuro se ve ilegible sobre fondo claro; estos dos tokens
         suben la opacidad en modo claro para un contraste marcado */
      --dim: rgba(59,59,59,0.92);
      --faint: rgba(59,59,59,0.75);
    }
    body {
      font-family: 'Montserrat', 'Segoe UI', sans-serif; font-weight: 400;
      width: 260px; padding: 16px; margin: 0;
      background: var(--bg); color: var(--text);
    }
    h2 {
      font-size: 13px; margin: 0 0 14px; letter-spacing: 0.02em;
      display: flex; align-items: center; gap: 8px; font-weight: 800;
    }
    h2 img { height: 16px; }
    #avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700; margin: 0 auto 10px; color: #fff;
      box-shadow: 0 4px 12px rgba(var(--accent-rgb),0.35);
    }
    #current { text-align: center; font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    #autoLabel { text-align: center; font-size: 11px; color: var(--dim); margin-bottom: 14px; }
    hr { border: none; border-top: 1px solid rgba(var(--ink-rgb),0.1); margin: 12px 0; }
    label { font-size: 11px; color: var(--dim); }
    input {
      width: 100%; padding: 8px; margin-top: 4px; font-family: inherit;
      border: 1px solid rgba(var(--ink-rgb),0.15); border-radius: 6px;
      background: rgba(var(--ink-rgb),0.06); color: var(--text);
      font-size: 13px; box-sizing: border-box;
    }
    .btn-primary {
      margin-top: 8px; width: 100%; padding: 8px; font-family: inherit;
      background: var(--accent);
      color: white; border: none; border-radius: 6px;
      font-size: 13px; cursor: pointer; font-weight: 600;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-primary:hover { background: #2f56c9; }
    .btn-ghost {
      width: 100%; padding: 8px; border-radius: 6px; font-size: 12px; font-weight: 600; font-family: inherit;
      background: rgba(var(--ink-rgb),0.07); color: var(--dim);
      border: 1px solid rgba(var(--ink-rgb),0.12); cursor: pointer;
    }
    .btn-ghost:hover { background: rgba(var(--ink-rgb),0.12); }
    #status { margin-top: 8px; font-size: 11px; color: #22c55e; text-align: center; min-height: 16px; }
    #collisionSection { margin-top: 10px; }
    .col-label { font-size: 11px; color: var(--dim); margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
    .col-card {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25);
      border-radius: 8px; padding: 7px 10px; margin-bottom: 5px;
    }
    .col-ticket { font-size: 12px; font-weight: 600; color: #f87171; margin-bottom: 2px; }
    .col-users { font-size: 11px; color: var(--dim); }
    .mode-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 10px;
    }
    .mode-label { font-size: 11px; color: var(--dim); display: flex; align-items: center; gap: 5px; }
    .toggle { position: relative; display: inline-block; width: 36px; height: 20px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(var(--ink-rgb),0.18); transition: .3s; border-radius: 20px;
    }
    .slider:before {
      position: absolute; content: ""; height: 14px; width: 14px;
      left: 3px; bottom: 3px; background: white; transition: .3s; border-radius: 50%;
    }
    input:checked + .slider { background: var(--accent); }
    input:checked + .slider:before { transform: translateX(16px); }
    #modeDesc { font-size: 10px; color: var(--faint); text-align: right; margin-top: 3px; }
    .renag-row { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
    .renag-row input {
      width: 56px; padding: 5px 6px; margin: 0; text-align: center; font-size: 12px;
    }
    /* Centro de notificaciones (espejo del buzón in-page) */
    #notifSection { margin-top: 6px; }
    .notif-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .notif-head .col-label { margin: 0; display: flex; align-items: center; gap: 6px; }
    .notif-count {
      background: #ef4444; color: #fff; font-size: 10px; font-weight: 800;
      min-width: 16px; height: 16px; border-radius: 8px; padding: 0 4px;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .notif-readall {
      background: none; border: none; color: var(--dim); font-family: inherit;
      font-size: 10px; cursor: pointer; padding: 2px 4px;
    }
    .notif-readall:hover { color: var(--text); }
    .notif-list { display: flex; flex-direction: column; gap: 5px; max-height: 220px; overflow-y: auto; }
    .notif-item {
      display: flex; gap: 8px; align-items: flex-start; padding: 7px 9px;
      border-radius: 8px; cursor: pointer; border-left: 3px solid transparent;
      background: rgba(var(--ink-rgb),0.05);
    }
    .notif-item.unread { background: var(--tint); border-left-color: var(--sev); }
    .notif-item.read { opacity: 0.55; }
    .notif-item:hover { background: rgba(var(--ink-rgb),0.1); }
    .notif-ico { flex-shrink: 0; margin-top: 1px; }
    .notif-body { flex: 1; min-width: 0; }
    .notif-title { font-size: 12px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 5px; }
    .notif-text { font-size: 11px; color: var(--dim); line-height: 1.3; margin-top: 1px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .notif-time { font-size: 10px; color: var(--faint); margin-top: 2px; }
    .notif-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .notif-empty { font-size: 11px; color: var(--faint); text-align: center; padding: 14px 0; }
    /* Selector de tema */
    .theme-seg { display: inline-flex; background: rgba(var(--ink-rgb),0.08); border-radius: 8px; padding: 2px; gap: 2px; }
    .theme-seg button { border: none; background: transparent; color: var(--dim); font-size: 11px; font-family: inherit; padding: 4px 9px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; }
    .theme-seg button.active { background: var(--accent); color: #fff; font-weight: 600; }
    /* Preferencias por tipo */
    .prefs-details { margin-top: 10px; }
    .prefs-details summary { font-size: 11px; color: var(--dim); cursor: pointer; list-style: none; padding: 4px 0; display: flex; align-items: center; gap: 5px; }
    .prefs-details summary::-webkit-details-marker { display: none; }
    .pref-row { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; }
    .pref-label { font-size: 12px; color: var(--dim); }
    .footer-brand { text-align: center; font-size: 10px; color: var(--faint); margin-top: 10px; }
    .footer-brand b { color: var(--accent); font-weight: 800; }
  </style>
</head>
<body>
  <h2><img src="netsus-logo.png" alt="netsus"> Autotask CoView</h2>
  <div id="avatar">?</div>
  <div id="current">Detectando...</div>
  <div id="autoLabel"></div>
  <hr />
  <label>Cambiar nombre manualmente</label>
  <input id="nameInput" type="text" placeholder="Ej: Ricardo Illanes" />
  <button class="btn-primary" id="saveBtn">Guardar</button>
  <div id="status"></div>
  <div class="mode-row" style="margin-top:10px">
    <span class="mode-label" id="soundLabel">Sonido de alerta</span>
    <label class="toggle">
      <input type="checkbox" id="soundToggle" checked>
      <span class="slider"></span>
    </label>
  </div>
  <div class="renag-row">
    <span class="mode-label" id="renagLabel">Re-avisar cada</span>
    <div style="display:flex;align-items:center;gap:5px">
      <input id="renagInput" type="number" min="1" max="60" value="3" />
      <span class="mode-label">min</span>
    </div>
  </div>
  <div class="renag-row">
    <span class="mode-label" id="themeLabel">Tema</span>
    <div class="theme-seg" id="themeSeg">
      <button type="button" data-theme-val="auto">Auto</button>
      <button type="button" data-theme-val="light"></button>
      <button type="button" data-theme-val="dark"></button>
    </div>
  </div>
  <details class="prefs-details">
    <summary id="prefsSummary">Tipos de notificación</summary>
    <div id="typePrefsList"></div>
  </details>
  <div id="collisionSection" style="display:none">
    <hr />
    <div class="col-label" id="collisionLabel">Colisiones activas</div>
    <div id="collisionList"></div>
  </div>
  <hr />
  <div id="notifSection">
    <div class="notif-head">
      <div class="col-label">Notificaciones <span id="notifCount" class="notif-count" style="display:none">0</span></div>
      <button id="notifReadAll" class="notif-readall">Marcar leídas</button>
    </div>
    <div id="notifList" class="notif-list"></div>
  </div>
  <hr />
  <button class="btn-ghost" id="adminBtn">Panel Admin</button>
  <div id="nameWarning" style="display:none;margin-top:8px;background:rgba(251,146,60,0.12);border:1px solid rgba(251,146,60,0.3);border-radius:6px;padding:7px 10px;font-size:11px;color:#fb923c;text-align:center">
    Nombre no detectado — escríbelo manualmente
  </div>
  <div id="footer" class="footer-brand"><b>netsus</b> · Innovación Tecnológica</div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
